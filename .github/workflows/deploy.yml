# Builds the site and deploys it to GitHub Pages on every push to main.
# Before this works: repo Settings → Pages → "Source: GitHub Actions".
# Builds on Linux, so it exercises the same case-/normalization-sensitive
# filesystem as the production host (catches asset path bugs that macOS hides).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # build:pages sets VITE_BASE=/setivir/ for the project-pages sub-path.
      - run: npm run build:pages
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
